name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sot/shared build

      - name: Generate Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      - name: Configure build
        working-directory: apps/mobile/android
        run: |
          sed -i 's/^reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/' gradle.properties
          sed -i 's/^newArchEnabled=.*/newArchEnabled=false/' gradle.properties
          sed -i "s/rootProject.name = '.*'/rootProject.name = 'SOT'/" settings.gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sot-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
